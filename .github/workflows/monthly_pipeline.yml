name: Data Pipeline with Notification

on:
  # Weekly run: Monday 00:00 UTC
  schedule:
    - cron: "0 0 * * 1"

  # Manual trigger
  workflow_dispatch:
    inputs:
      source:
        description: "Data source to fetch (leave blank for all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - singstat
          - mas
          - worldbank

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Dry-run validation
      - name: Dry-run validation
        run: python pipeline/run_pipeline.py --dry-run

      # 5. Run pipeline
      - name: Run data pipeline
        id: run_pipeline
        run: |
          if [ -n "${{ github.event.inputs.source }}" ]; then
            echo "Running specific source: ${{ github.event.inputs.source }}"
            python pipeline/run_pipeline.py --source ${{ github.event.inputs.source }}
          else
            echo "Running full pipeline (YAML controlled)"
            python pipeline/run_pipeline.py
          fi

      # 6. Commit data
      - name: Commit updated data
        id: commit_step
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw/
          git add data/processed/
          git add data/pipeline_log.json || true

          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes"
          else
            DATE=$(date '+%Y-%m-%d')
            git commit -m "data: update ${DATE} [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data committed"
          fi